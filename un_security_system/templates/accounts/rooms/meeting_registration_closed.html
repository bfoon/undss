<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Link Closed</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f4f9fc 0%, #eaf4fb 100%);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            padding: 1.5rem;
        }
        .closed-card {
            background: white;
            max-width: 560px;
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(19,59,92,.12);
            overflow: hidden;
            border: 1px solid #d9e9f2;
        }
        .closed-header {
            background: linear-gradient(135deg, #133b5c 0%, #009edb 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .closed-icon {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            background: rgba(255,255,255,.14);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1rem;
        }
        .closed-body {
            padding: 2rem;
            text-align: center;
        }
        .reason-box {
            background: #f8fbfd;
            border: 1px solid #dceaf3;
            border-radius: 16px;
            padding: 1rem 1.2rem;
            color: #234;
            margin-top: 1rem;
        }
        .meeting-title {
            font-weight: 800;
            color: #133b5c;
            margin-bottom: .4rem;
        }
        .meeting-meta {
            color: #6b7280;
            font-size: .95rem;
        }
    </style>
</head>
<body>
    <div class="closed-card">
        <div class="closed-header">
            <div class="closed-icon">
                <i class="bi bi-lock-fill"></i>
            </div>
            <h2 class="mb-0">Attendance Page Closed</h2>
        </div>

        <div class="closed-body">
            <div class="meeting-title">{{ booking.title }}</div>
            <div class="meeting-meta">
                {{ booking.date }} · {{ booking.start_time }} - {{ booking.end_time }}
            </div>

            <div class="reason-box">
                {{ block_reason }}
            </div>
        </div>
    </div>
</body>
</html>
